    <noscript><main style="max-width:48rem;margin:0 auto;padding:2rem 1rem;font-family:Arial,system-ui,sans-serif;line-height:1.6;color:#0F0F0E"><p><a href="/">Home</a> / Hayakom - Kuwait National Sports &amp; Events App</p><h1>Hayakom - Kuwait National Sports &amp; Events App</h1><p>A unified official app for Kuwait&#39;s Public Authority for Sport, designed around national tournaments, live scores, event tickets, and tourism.</p><p><strong>Discipline:</strong> Mobile Product Design | <strong>Year:</strong> 2024 | <strong>Client:</strong> Kuwait Public Authority for Sport | <strong>Role:</strong> Lead Product Designer</p><section><h2>Context</h2><p>Hayakom is the official Kuwait Public Authority for Sport app, bringing national tournaments, cultural events, tickets, and tourism into one mobile product.</p></section><section><h2>Problem</h2><p>People needed a clear way to move between live sport, upcoming events, booking, and visitor information without navigating separate services or losing the match-day context.</p></section><section><h2>Role and scope</h2><p>Lead Product Designer responsible for discovery architecture, interaction flows, bilingual UI direction, reusable components, and design handoff across the mobile experience.</p></section><section><h2>Constraints</h2><ul><li>Support Arabic and English with complete right-to-left and left-to-right behavior.</li><li>Unify live matches, scheduled events, ticketing, teams, players, offers, and tourism without making the home screen feel crowded.</li><li>Create patterns that could expand to new tournaments and event types while staying aligned with the Hayakom Kuwait brand.</li></ul></section><section><h2>Key decisions</h2><ol><li>Organized discovery around what is happening today, this week, and this season so live and upcoming content has an understandable priority.</li><li>Designed reusable match, event, team, and player components with explicit live, upcoming, and completed states.</li><li>Kept booking, support, offers, and tourism connected to the core journey without competing with the primary sports content.</li></ol></section><section><h2>What shipped</h2><ul><li>Discovery-led home and event browsing flows.</li><li>Live match, fixture, lineup, team, and player experiences.</li><li>Ticket discovery and booking entry points.</li><li>Bilingual Arabic and English layouts with full RTL support.</li><li>A reusable visual system of tokens, type styles, and components.</li></ul></section><section><h2>Outcome</h2><p>Hayakom shipped as a unified official app for Kuwait&#39;s national sports and cultural calendar, giving the authority one coherent product that can receive regular content updates across the season.</p></section><section><h2>Reflection</h2><p>The strongest design work was the information architecture: establishing clear priority among live, scheduled, and evergreen content before refining the visual layer.</p></section><p><a href="https://apps.apple.com/kw/app/hayakom-%D8%AD%D9%8A%D8%A7%D9%83%D9%85/id6738199649" rel="noopener noreferrer">View live project</a></p><p><a href="/">Back to all projects</a></p></main></noscript>
